global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Sport Horizon API
  - job_name: 'sporthorizon-api'
    static_configs:
      - targets: ['sporthorizon-api:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  # Vaitask API
  - job_name: 'vaitask-api'
    static_configs:
      - targets: ['vaitask-api:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  # PostgreSQL (requires postgres_exporter sidecar - optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis (requires redis_exporter sidecar - optional)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # RabbitMQ (built-in prometheus metrics)
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['dev-rabbitmq:15692']
    metrics_path: /metrics
